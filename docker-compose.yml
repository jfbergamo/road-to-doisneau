services:
  postgres:
    restart: unless-stopped
    image: postgres:latest
    container_name: rtd_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: road_to_doisneau
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./RoadToDoisneau.Db/init.sql:/docker-entrypoint-initdb.d/init.sql
  server:
    restart: unless-stopped
    build: .
    container_name: rtd_server
    ports:
      - "80:8080"
    environment:
      ConnectionStrings__db: Server=rtd_db;Port=5432;Database=road_to_doisneau;User Id=${DB_USER};Password=${DB_PASSWORD};
    depends_on:
      - postgres

volumes:
  postgres_data: