        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.getElementById('favicon').setAttribute('href', '/content/icons/favicon/logo_favicon_light.svg');

<body>

        </div>

        <div class="nav-content" id="navigation">
            <nav>

                    <li><a href="/" data-i18n="nav.home">Home</a></li>
                    <li><a href="/about" data-i18n="nav.about">Autore</a></li>
                    <li><a href="/gallery" data-i18n="nav.gallery">Galleria</a></li>
