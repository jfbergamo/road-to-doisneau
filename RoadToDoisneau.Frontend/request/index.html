<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title data-i18n="request.title">Grazie!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <div class="participant-card-visual">
            <h1 class="serif-title" data-i18n="request.tk_contact">GRAZIE PER AVERCI CONTATTATO!</h1>
            
            <div class="request-info-box">
                <span class="request-label" data-i18n="request.req_type">Tipologia richiesta:</span>
                <h2 id="display-richiesta" class="ticket-tag"></h2>
                
                <div id="container-messaggio" class="message-detail-container">
                    <span class="request-label" data-i18n="request.insert_detail">Richiesta inserita:</span>
                    <p id="display-messaggio" class="message-text"></p>
                </div>
            </div>

            <div class="action-area">
                <p id="thank" data-i18n="request.waiting">In attesa di una risposta da parte del nostro team la invitiamo a visitare il sito dedicato alla mostra!</p>
                <a href="/" class="btn btn-pill" data-i18n="request.home">Vai alla Home</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="/content/accessibility-menu.min.js"></script>
    <script src="/accessibility.js"></script>
    
</body>
</html>
