<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="purchase.title">Pagamento Sicuro | Road to Doisneau</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="navbar">
        <div class="nav-logo">
            <a href="/"><img src="/content/logo/logo.svg" alt="Logo" class="logo-icon"></a>
        </div>
        <div class="nav-right">
            <a href="/formTicket/" class="btn btn-outline" data-i18n="purchase.back">Indietro</a>
        </div>
    </header>

    <div id="checkout-screen" class="checkout-container">
        <div class="card">
            <h2 class="serif-title" style="font-size: 1.5rem;" data-i18n="purchase.pay_met">Metodo di Pagamento</h2>
            <form id="purchaseForm">
                <div class="credit-card-box">
                    <div class="cc-chip"></div>
                    <div class="cc-number-display" id="card-display">•••• •••• •••• ••••</div>
                    <div
                        style="display: flex; justify-content: space-between; font-size: 0.8rem; text-transform: uppercase;">
                        <span id="name-display" data-i18n="purchase.card_tito">TITOLARE CARTA</span>
                        <span id="date-display" data-i18n="purchase.card_scadenza">MM/AA</span>
                    </div>
                </div>

                <div class="form-group">
                    <label data-i18n="purchase.card_tito_2">Titolare della Carta</label>
                    <input type="text" id="cc-name" placeholder="NOME COGNOME" required>
                </div>

                <div class="form-group">
                    <label data-i18n="purchase.card_numb">Numero Carta</label>
                    <input type="tel" id="cc-num" placeholder="1234 5678 1234 5678" inputmode="numeric" maxlength="19"
                        required>
                </div>

                <div style="display: grid; grid-template-columns: 1.5fr 1fr; gap: 10px;">
                    <div class="form-group">
                        <label data-i18n="purchase.card_scad_2">Scadenza</label>
                        <input type="text" id="cc-exp" maxlength="5" placeholder="MM/AA" required>
                    </div>
                    <div class="form-group">
                        <label>CVV</label>
                        <input type="password" id="cc-cvv" maxlength="3" inputmode="numeric" pattern="\d*"
                            placeholder="***" required>
                    </div>
                </div>
            </form>
        </div>

        <div class="card" style="height: fit-content;">
            <h2 class="serif-title" style="font-size: 1.5rem;" data-i18n="purchase.card_recap">Riepilogo Biglietti</h2>
            <div id="ticket-summary-list">
            </div>
            <div class="total" style="border-top: 2px solid #eee; margin-top: 15px; padding-top: 15px;">
                <span data-i18n="purchase.total">Totale da Pagare</span>
                <span id="final-total-display">€ 0,00</span>
                <hr>
            </div>
            <button type="button" class="btn-pay" onclick="simulatePurchase()" data-i18n="purchase.pay_now">Paga
                Ora</button>
            <p style="text-align: center; font-size: 1.1rem; color: #4a7fca; margin-top: 15px;"
                data-i18n="purchase.incrip_tran">Transazione criptata</p>
        </div>
    </div>

    <div id="loader" class="card" style="max-width: 400px; display: none; margin: 100px auto; text-align: center;">
        <div class="spinner"></div>
        <h3 data-i18n="purchase.verify">Verifica Transazione...</h3>
        <p data-i18n="purchase.bank_com">Stiamo comunicando con il tuo istituto bancario.</p>
    </div>

    <div id="success-page" class="card" style="max-width: 800px; display: none; margin: 145px auto; text-align: center; padding: 100px 20px 60px; margin-bottom: 20px;">
        <h1 style="color: #052444;" data-i18n="purchase.buy_confirm">Acquisto Confermato!</h1>
        <p data-i18n="purchase.thanks">Grazie, i tuoi biglietti per <strong>Road to Doisneau</strong> sono pronti.</p>
        <div id="qr-container-grid"
            style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 30px;">
        </div>
        <button class="btn-pay" style="margin-top: 30px;" onclick="window.location.href='/'"
            data-i18n="purchase.home">Torna alla Home</button>
    </div>

    <script src="/api_common.js"></script>
    <script src="purchaseScript.js"></script>
    <script src="/content/accessibility-menu.min.js"></script>
    <script src="/accessibility.js"></script>

</body>

</html>
